components:
  schemas:
    Error:
      properties:
        name:
          description: 'Exception name'
          type: string
          example: 'Not Found Exception'
        message:
          description: 'Exception message'
          type: string
          example: 'The requested resource was not found.'
        code:
          description: 'Exception code'
          type: number
          example: 0
        status:
          description: 'Http status code'
          type: number
          example: 404
      type: object
    FieldError:
      properties:
        field:
          description: 'Form field with error'
          type: string
          example: content
        error:
          description: 'Error text'
          type: string
          example: 'error message'
      type: object
    Event:
      properties:
        id:
          description: 'Unique event ID'
          type: number
          readOnly: true
          example: test
          nullable: true
        name:
          description: 'Name of event, unique for project'
          type: string
          example: test
        title:
          description: 'Human readable title of the event'
          type: string
          example: 'Test event'
          nullable: true
      type: object
    Feed:
      properties:
        id:
          description: 'Unique integer ID'
          type: number
          readOnly: true
          example: 1
        name:
          description: 'Text displayd name'
          type: string
          maxLength: 50
          example: 'My feed'
          nullable: true
        slug:
          description: 'Slugable name for use in SDK'
          type: string
          maxLength: 50
          example: myfeed
        type:
          description: "Type\n * 0 - user created feed\n * 1 - system feed, can`t deleted or change slug"
          type: number
          enum:
            - 0
            - 1
          readOnly: true
      type: object
    Info:
      properties:
        id:
          description: 'Project unique id'
          type: string
          example: 1
        name:
          description: 'Project name'
          type: string
          example: 'My project'
      type: object
    Label:
      properties:
        id:
          description: 'Unique label integer ID'
          type: number
          readOnly: true
          example: 1
        label:
          description: 'Label text'
          type: string
          maxLength: 255
          example: 'my label'
          nullable: true
        color:
          description: 'Label color'
          type: string
          example: '#ff0000'
          nullable: true
      type: object
    Placeholder:
      properties:
        id:
          description: 'Placeholder unique id'
          type: number
          readOnly: true
          example: 1
        name:
          description: 'Placeholder name'
          type: string
          maxLength: 30
          minLength: 1
          example: username
        type:
          description: "Type of placeholder:\n * 0 - text\n * 1 - image"
          type: string
          default: 0
          enum:
            - 0
            - 1
          example: 0
        defaultValue:
          description: 'Placeholder default value'
          type: string
          maxLength: 255
          minLength: 1
          example: Friend
      type: object
    PromoCode:
      properties:
        id:
          description: 'Unique promotion code ID'
          type: number
          readOnly: true
          example: 1
        name:
          description: 'Promotion code name'
          type: string
          example: 'Promo company 1'
        usedCount:
          description: 'Used promotion code variants'
          type: number
          readOnly: true
          example: 200
        totalCount:
          description: 'Total promotion code variants alocated'
          type: number
          readOnly: true
          example: 1000
      type: object
    PromoCodeVariant:
      properties:
        code:
          description: 'Unique promotion code varinat value'
          type: string
          readOnly: true
          example: bepromo
          nullable: false
        usedAt:
          description: 'Promotion code activation time in UNIX timestamp'
          type: number
          readOnly: true
          example: 1635491736
          nullable: true
        userId:
          description: "Unique user format on the partner's side in SDK user ID, case-sensitive"
          type: string
          example: max-brant
          nullable: true
      type: object
    Segment:
      properties:
        id:
          description: 'Unique segment ID'
          type: number
          readOnly: true
          example: 1
        name:
          description: 'Unique segment name'
          type: string
          example: seg1
        userCount:
          description: 'Count users into segment'
          type: number
          readOnly: true
          example: 1000
      type: object
    SegmentUser:
      properties:
        userId:
          description: "Unique user format on the partner's side in SDK user ID, case-sensitive"
          type: string
          example: test-user
      type: object
    StoryStatisticSummary:
      properties:
        id:
          description: 'Story unique id'
          type: integer
          example: 1
        stringId:
          description: 'Story string id'
          type: string
          example: ds9ihv8
        variantName:
          description: 'Letter for variant if hes A/B test'
          type: string
          example: A
          nullable: true
        languageCode:
          description: 'Language code, if use'
          type: string
          example: en
          nullable: true
        view:
          description: 'Number of users who view story cover, not unique'
          type: integer
          example: 12000
        open:
          description: 'Number of users who opened story, not unique'
          type: integer
          example: 6000
        read:
          description: 'Number of users who read story (view all slides), not unique'
          type: integer
          example: 3000
        click:
          description: 'Number of users who click CPA in story, not unique'
          type: integer
          example: 1500
        viewUniqueDay:
          description: 'Number of users who view story cover, unique for 24 hour'
          type: integer
          example: 12000
        openUniqueDay:
          description: 'Number of users who opened story, unique for 24 hour'
          type: integer
          example: 6000
        readUniqueDay:
          description: 'Number of users who read story (view all slides), unique for 24 hour'
          type: integer
          example: 3000
        clickUniqueDay:
          description: 'Number of users who click CPA in story, unique for 24 hour'
          type: integer
          example: 1500
        viewUnique:
          description: 'Number of users who view story cover, unique for all time'
          type: integer
          example: 12000
        openUnique:
          description: 'Number of users who opened story, unique for all time'
          type: integer
          example: 6000
        readUnique:
          description: 'Number of users who read story, unique for all time (view all slides)'
          type: integer
          example: 3000
        clickUnique:
          description: 'Number of users who click CPA in story, unique for all time'
          type: integer
          example: 1500
        like:
          description: 'Number of users who mark story as like'
          type: integer
          example: 200
        dislike:
          description: 'Number of users who mark story as dislike'
          type: integer
          example: 10
        favorite:
          description: 'Number of users who add story to favorite'
          type: integer
          example: 1000
        share:
          description: 'Number of users who share story'
          type: integer
          example: 0
        averageSlideView:
          description: 'Average slide view for users'
