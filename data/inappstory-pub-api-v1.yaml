openapi: 3.0.0
info:
  title: 'Public API'
  description: "\n<!-- theme: warning -->\n> #### Rate Limit\n> To prevent abuse, you should consider adding rate limiting to your APIs.\n> For example, you may want to limit the API usage of each project to be at most 100 API calls within a period of 1 minut. If too many requests are received from a project within the stated period of the time, a response with status code 429 (meaning \"Too Many Requests\") should be returned.\n>\n>\n> See headers for control number of requests:\n> * **X-Rate-Limit-Limit** - The maximum number of requests allowed with a time period.\n> * **X-Rate-Limit-Remaining** - The number of remaining requests in the current time period.\n> * **X-Rate-Limit-Reset** - The number of seconds to wait in order to get the maximum number of allowed requests.\n"
  version: 1.0.0
servers:
  -
    url: 'https://api.inappstory.ru/pub/v1'
paths:
  /event:
    get:
      tags:
        - Events
      summary: List
      description: 'List of all events'
      operationId: event-list
      parameters:
        -
          $ref: '#/components/parameters/Envelope'
        -
          $ref: '#/components/parameters/Page'
        -
          $ref: '#/components/parameters/PerPage'
        -
          $ref: '#/components/parameters/EventFields'
        -
          name: sort
          in: query
          schema:
            description: 'Result sorting'
            type: string
            default: id
            enum:
              - id
              - '-id'
              - name
              - '-name'
              - title
              - '-title'
      responses:
        '200':
          description: 'successful operation'
          headers:
            X-Pagination-Total-Count:
              $ref: '#/components/headers/X-Pagination-Total-Count'
            X-Pagination-Page-Count:
              $ref: '#/components/headers/X-Pagination-Page-Count'
            X-Pagination-Current-Page:
              $ref: '#/components/headers/X-Pagination-Current-Page'
            X-Pagination-Per-Page:
              $ref: '#/components/headers/X-Pagination-Per-Page'
            Link:
              description: 'Links for navigation'
              schema:
                type: string
                example: 'link: <https://api.inappstory.com/pub/v1/event?page=2&sort=id>; rel=self, <https://api.inappstory.com/pub/v1/event?page=1&sort=id>; rel=first, <https://api.inappstory.com/pub/v1/event?page=7&sort=id>; rel=last, <https://api.inappstory.com/pub/v1/event?page=1&sort=id>; rel=prev, <https://api.inappstory.com/pub/v1/event?page=3&sort=id>; rel=next'
            X-Rate-Limit-Limit:
              $ref: '#/components/headers/X-Rate-Limit-Limit'
            X-Rate-Limit-Remaining:
              $ref: '#/components/headers/X-Rate-Limit-Remaining'
            X-Rate-Limit-Reset:
              $ref: '#/components/headers/X-Rate-Limit-Reset'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '401':
          description: 'Authorization required'
        '402':
          description: 'Your account has run out of funds, payment is required for further use'
        '403':
          description: 'You do not have permission to access this resource'
        '429':
          $ref: '#/components/responses/RateLimit'
      security:
        -
          bearerPrivateAuth: []
    post:
      tags:
        - Events
      summary: Create
      operationId: event-create
      parameters:
        -
          $ref: '#/components/parameters/EventFields'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
      responses:
        '200':
          description: 'A new event was not created because there is already a name with the same name'
          headers:
            X-Rate-Limit-Limit:
              $ref: '#/components/headers/X-Rate-Limit-Limit'
            X-Rate-Limit-Remaining:
              $ref: '#/components/headers/X-Rate-Limit-Remaining'
            X-Rate-Limit-Reset:
              $ref: '#/components/headers/X-Rate-Limit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '201':
          description: 'New event created'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          description: 'Authorization required'
        '402':
          description: 'Your account has run out of funds, payment is required for further use'
        '403':
          description: 'You do not have permission to access this resource'
        '429':
