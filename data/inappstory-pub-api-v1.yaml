              description: 'Total number of pages of data'
              schema:
                type: integer
            X-Pagination-Current-Page:
              description: 'The current page number (1-based)'
              schema:
                type: integer
            X-Pagination-Per-Page:
              description: 'Number of data items in each page'
              schema:
