          in: query
          schema:
            description: 'Show maximum items per page'
            type: number
            default: 20
            maximum: 50
            minimum: 1
        -
          name: fields
          in: query
          style: simple
          explode: false
          schema:
            description: 'Return only fields'
            type: array
            items:
