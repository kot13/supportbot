services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: supportbot-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: supportbot
      POSTGRES_PASSWORD: supportbot
      POSTGRES_DB: supportbot
    volumes:
      - supportbot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportbot -d supportbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  supportbot_pg_data:
