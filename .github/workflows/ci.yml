name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: supportbot
          POSTGRES_PASSWORD: supportbot
          POSTGRES_DB: supportbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U supportbot -d supportbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://supportbot:supportbot@localhost:5432/supportbot
      ADMIN_LOGIN: ci-admin
      ADMIN_PASSWORD: ci-password
      OPENAI_API_KEY: sk-ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Migrate
        run: npm run db:migrate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            ./scripts/deploy.sh
